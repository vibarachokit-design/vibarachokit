<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administración · Kihnally</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    body { background: #f5f6fa; color: #162544; }
    .field { width:100%; border:1px solid #dce3f0; border-radius:12px; padding:10px 12px; background:white; }
    .field:focus { outline:none; border-color:#ff6b35; box-shadow:0 0 0 3px rgba(255,107,53,.12); }
    .label { display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; color:#6280b5; }
    .toast { position:fixed; right:20px; bottom:20px; z-index:100; padding:14px 18px; border-radius:14px; color:white; background:#162544; box-shadow:0 15px 40px #0003; max-width:360px; }
  </style>
</head>
<body class="min-h-screen">
  <section id="loginView" class="min-h-screen flex items-center justify-center p-5">
    <form id="loginForm" class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md">
      <div class="text-5xl mb-5">📚</div>
      <h1 class="text-3xl font-black">Panel Kihnally</h1>
      <p class="text-sm text-slate-500 mt-2 mb-7">Acceso exclusivo para administradores.</p>
      <label class="label" for="loginEmail">Correo</label>
      <input id="loginEmail" class="field mb-4" type="email" autocomplete="username" required>
      <label class="label" for="loginPassword">Contraseña</label>
      <input id="loginPassword" class="field mb-6" type="password" autocomplete="current-password" required>
      <button id="loginButton" class="w-full bg-orange-500 hover:bg-orange-600 text-white rounded-xl py-3 font-bold">Ingresar</button>
      <p id="loginError" class="text-red-500 text-sm mt-4 hidden"></p>
      <a href="index.html" class="block text-center text-sm text-slate-400 mt-6 hover:text-orange-500">← Volver a la tienda</a>
    </form>
  </section>

  <main id="adminView" class="hidden max-w-7xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row gap-4 md:items-center justify-between mb-8">
      <div><h1 class="text-3xl font-black">Administrar catálogo</h1><p id="sessionEmail" class="text-sm text-slate-500"></p></div>
      <div class="flex flex-wrap gap-2">
        <button onclick="openEditor()" class="bg-orange-500 text-white px-5 py-2.5 rounded-xl font-bold">＋ Nuevo libro</button>
        <button onclick="loadBooks()" class="bg-teal-500 text-white px-5 py-2.5 rounded-xl font-bold">↻ Actualizar</button>
        <a href="index.html" target="_blank" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold">Ver tienda</a>
        <button onclick="logout()" class="bg-white border px-5 py-2.5 rounded-xl font-bold">Salir</button>
      </div>
    </header>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-7">
      <div class="bg-white rounded-2xl p-5"><b id="statBooks" class="text-3xl">0</b><p class="text-xs text-slate-400 uppercase">Libros</p></div>
      <div class="bg-white rounded-2xl p-5"><b id="statChapters" class="text-3xl">0</b><p class="text-xs text-slate-400 uppercase">Capítulos</p></div>
      <div class="bg-white rounded-2xl p-5"><b id="statPublished" class="text-3xl">0</b><p class="text-xs text-slate-400 uppercase">Publicados</p></div>
      <div class="bg-white rounded-2xl p-5"><b id="statAverage" class="text-3xl">$0</b><p class="text-xs text-slate-400 uppercase">Precio promedio</p></div>
    </div>
    <div id="bookList" class="grid md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
  </main>

  <div id="editor" class="hidden fixed inset-0 z-50 bg-slate-900/70 p-3 md:p-8 overflow-y-auto">
    <form id="bookForm" class="bg-white max-w-4xl mx-auto rounded-3xl p-6 md:p-8 shadow-2xl">
      <div class="flex justify-between items-center mb-7"><h2 id="editorTitle" class="text-2xl font-black">Nuevo libro</h2><button type="button" onclick="closeEditor()" class="text-2xl">✕</button></div>
      <input id="bookId" type="hidden">
      <div class="grid md:grid-cols-2 gap-5">
        <div><label class="label" for="slug">Identificador (slug)</label><input id="slug" class="field" pattern="[a-z0-9-]+" required placeholder="mi-nuevo-libro"></div>
        <div><label class="label" for="title">Título</label><input id="title" class="field" required></div>
        <div class="md:col-span-2"><label class="label" for="subtitle">Subtítulo</label><input id="subtitle" class="field"></div>
        <div class="md:col-span-2"><label class="label" for="description">Descripción</label><textarea id="description" class="field" rows="4"></textarea></div>
        <div><label class="label" for="badge">Etiqueta</label><input id="badge" class="field" placeholder="Aventura"></div>
        <div><label class="label" for="colorKey">Color</label><select id="colorKey" class="field"><option value="coral">Coral</option><option value="teal">Turquesa</option><option value="sun">Amarillo</option><option value="grape">Morado</option></select></div>
        <div><label class="label" for="pricePhysical">Precio del libro completo</label><input id="pricePhysical" class="field" type="number" min="0" step="1" value="0"></div>
        <div><label class="label" for="sortOrder">Orden</label><input id="sortOrder" class="field" type="number" step="1" value="0"></div>
        <div class="md:col-span-2"><label class="label" for="tags">Categorías, separadas por coma</label><input id="tags" class="field" placeholder="Infantil, Aventura, Chile"></div>
        <div><label class="label" for="coverFile">Portada</label><input id="coverFile" class="field" type="file" accept="image/jpeg,image/png,image/webp"><input id="imageUrl" type="hidden"><img id="coverPreview" class="hidden mt-3 w-28 h-36 object-cover rounded-xl" alt="Portada actual"></div>
        <div><label class="label" for="previewFiles">Páginas interiores</label><input id="previewFiles" class="field" type="file" accept="image/jpeg,image/png,image/webp" multiple><p class="text-xs text-slate-400 mt-2">Las nuevas imágenes reemplazan las anteriores.</p><input id="previewUrls" type="hidden"></div>
        <div class="md:col-span-2"><label class="label" for="chapters">Capítulos: uno por línea, con formato Nombre | Precio</label><textarea id="chapters" class="field font-mono" rows="6" placeholder="Capítulo 1 | 3500&#10;Capítulo 2 | 3500"></textarea></div>
        <label class="md:col-span-2 flex items-center gap-3"><input id="published" type="checkbox" class="w-5 h-5" checked><span class="font-bold">Visible en la tienda</span></label>
      </div>
      <div class="flex justify-end gap-3 mt-8"><button type="button" onclick="closeEditor()" class="px-6 py-3 rounded-xl border font-bold">Cancelar</button><button id="saveButton" class="px-7 py-3 rounded-xl bg-orange-500 text-white font-bold">Guardar cambios</button></div>
    </form>
  </div>

  <script>
    const config = window.KIHNALLY_CONFIG;
    const db = window.supabase.createClient(config.supabaseUrl, config.supabasePublishableKey);
    let books = [];
    const $ = id => document.getElementById(id);
    const money = n => '$' + Number(n || 0).toLocaleString('es-CL');
    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    function toast(message, error = false) {
      document.querySelector('.toast')?.remove();
      const el = document.createElement('div'); el.className = 'toast';
      if (error) el.style.background = '#b91c1c'; el.textContent = message;
      document.body.appendChild(el); setTimeout(() => el.remove(), 4000);
    }

    $('loginForm').addEventListener('submit', async event => {
      event.preventDefault(); $('loginButton').disabled = true; $('loginError').classList.add('hidden');
      const { error } = await db.auth.signInWithPassword({ email: $('loginEmail').value.trim(), password: $('loginPassword').value });
      $('loginButton').disabled = false;
      if (error) { $('loginError').textContent = 'No se pudo iniciar sesión: ' + error.message; $('loginError').classList.remove('hidden'); return; }
      await enterAdmin();
    });

    async function enterAdmin() {
      const { data: { user } } = await db.auth.getUser();
      if (!user) return showLogin();
      const { data: role } = await db.from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
      if (!role) { await db.auth.signOut(); $('loginError').textContent = 'Este usuario no está autorizado como administrador.'; $('loginError').classList.remove('hidden'); return showLogin(); }
      $('loginView').classList.add('hidden'); $('adminView').classList.remove('hidden'); $('sessionEmail').textContent = user.email; await loadBooks();
    }
    function showLogin() { $('adminView').classList.add('hidden'); $('loginView').classList.remove('hidden'); }
    async function logout() { await db.auth.signOut(); showLogin(); }

    async function loadBooks() {
      $('bookList').innerHTML = '<p class="text-slate-400">Cargando catálogo…</p>';
      const { data, error } = await db.from('books').select('*, chapters(*)').order('sort_order');
      if (error) return toast(error.message, true);
      books = data || []; renderBooks();
    }

    function renderBooks() {
      $('statBooks').textContent = books.length;
      $('statChapters').textContent = books.reduce((n,b) => n + (b.chapters?.length || 0), 0);
      $('statPublished').textContent = books.filter(b => b.published).length;
      $('statAverage').textContent = money(books.length ? Math.round(books.reduce((n,b) => n + b.price_physical, 0) / books.length) : 0);
      if (!books.length) { $('bookList').innerHTML = '<div class="bg-white rounded-2xl p-10 text-center md:col-span-2 xl:col-span-3">No hay libros. Crea el primero.</div>'; return; }
      $('bookList').innerHTML = books.map(book => `
        <article class="bg-white rounded-2xl p-5 shadow-sm">
          <div class="flex gap-4"><div class="w-24 h-32 rounded-xl bg-slate-100 overflow-hidden flex-shrink-0">${book.image_url ? `<img src="${escapeHtml(book.image_url)}" class="w-full h-full object-cover" alt="">` : '<span class="h-full flex items-center justify-center text-4xl">📚</span>'}</div>
          <div class="min-w-0"><div class="flex gap-2 items-center"><h2 class="font-black text-lg truncate">${escapeHtml(book.title)}</h2><span class="text-[9px] px-2 py-1 rounded-full ${book.published ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${book.published ? 'VISIBLE' : 'OCULTO'}</span></div><p class="text-sm text-slate-500 line-clamp-2">${escapeHtml(book.subtitle)}</p><p class="font-black text-orange-500 mt-2">${money(book.price_physical)}</p><p class="text-xs text-slate-400">${book.chapters?.length || 0} capítulos</p></div></div>
          <div class="flex gap-2 mt-5"><button onclick="openEditor('${book.id}')" class="flex-1 bg-blue-50 text-blue-700 rounded-xl py-2 font-bold">Editar</button><button onclick="deleteBook('${book.id}')" class="bg-red-50 text-red-600 rounded-xl px-4 font-bold">Eliminar</button></div>
        </article>`).join('');
    }

    function openEditor(id = '') {
      const book = books.find(b => b.id === id);
      $('bookForm').reset(); $('bookId').value = book?.id || ''; $('editorTitle').textContent = book ? 'Editar libro' : 'Nuevo libro';
      $('slug').value = book?.slug || ''; $('slug').disabled = Boolean(book);
      $('title').value = book?.title || ''; $('subtitle').value = book?.subtitle || ''; $('description').value = book?.description || '';
      $('badge').value = book?.badge || 'Libro'; $('colorKey').value = book?.color_key || 'coral'; $('pricePhysical').value = book?.price_physical || 0;
      $('sortOrder').value = book?.sort_order || 0; $('tags').value = (book?.tags || []).join(', '); $('published').checked = book?.published ?? true;
      $('imageUrl').value = book?.image_url || ''; $('previewUrls').value = JSON.stringify(book?.preview_images || []);
      $('chapters').value = (book?.chapters || []).sort((a,b) => a.sort_order-b.sort_order).map(ch => `${ch.name} | ${ch.price}`).join('\n');
      $('coverPreview').src = book?.image_url || ''; $('coverPreview').classList.toggle('hidden', !book?.image_url);
      $('editor').classList.remove('hidden'); document.body.style.overflow = 'hidden';
    }
    function closeEditor() { $('editor').classList.add('hidden'); document.body.style.overflow = ''; }

    async function uploadFile(file, folder) {
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `${folder}/${crypto.randomUUID()}.${ext}`;
      const { error } = await db.storage.from(config.storageBucket).upload(path, file, { contentType: file.type, upsert: false });
      if (error) throw error;
      return db.storage.from(config.storageBucket).getPublicUrl(path).data.publicUrl;
    }

    $('bookForm').addEventListener('submit', async event => {
      event.preventDefault(); $('saveButton').disabled = true; $('saveButton').textContent = 'Guardando…';
      try {
        const currentId = $('bookId').value;
        let imageUrl = $('imageUrl').value;
        if ($('coverFile').files[0]) imageUrl = await uploadFile($('coverFile').files[0], 'covers');
        let previewImages = JSON.parse($('previewUrls').value || '[]');
        if ($('previewFiles').files.length) previewImages = await Promise.all([...$('previewFiles').files].map(file => uploadFile(file, 'previews')));
        const payload = { slug:$('slug').value.trim(), title:$('title').value.trim(), subtitle:$('subtitle').value.trim(), description:$('description').value.trim(), image_url:imageUrl, preview_images:previewImages, badge:$('badge').value.trim() || 'Libro', color_key:$('colorKey').value, price_physical:Number($('pricePhysical').value)||0, tags:$('tags').value.split(',').map(x=>x.trim()).filter(Boolean), published:$('published').checked, sort_order:Number($('sortOrder').value)||0 };
        let bookId = currentId;
        if (currentId) { const { error } = await db.from('books').update(payload).eq('id', currentId); if (error) throw error; }
        else { const { data, error } = await db.from('books').insert(payload).select('id').single(); if (error) throw error; bookId = data.id; }
        const chapterLines = $('chapters').value.split('\n').map(x=>x.trim()).filter(Boolean);
        const chapters = chapterLines.map((line,index) => { const [name, rawPrice] = line.split('|'); return { book_id:bookId, code:`c${index+1}`, name:(name||'').trim(), price:Number((rawPrice||'0').trim())||0, sort_order:index, published:true }; }).filter(ch=>ch.name);
        const { error: deleteError } = await db.from('chapters').delete().eq('book_id', bookId); if (deleteError) throw deleteError;
        if (chapters.length) { const { error } = await db.from('chapters').insert(chapters); if (error) throw error; }
        closeEditor(); await loadBooks(); toast('✅ Libro guardado correctamente');
      } catch (error) { console.error(error); toast('No se pudo guardar: ' + error.message, true); }
      finally { $('saveButton').disabled = false; $('saveButton').textContent = 'Guardar cambios'; }
    });

    async function deleteBook(id) {
      const book = books.find(b => b.id === id); if (!book || !confirm(`¿Eliminar “${book.title}” y todos sus capítulos?`)) return;
      const { error } = await db.from('books').delete().eq('id', id); if (error) return toast(error.message, true);
      await loadBooks(); toast('Libro eliminado');
    }

    db.auth.onAuthStateChange((_event, session) => { if (!session) showLogin(); });
    db.auth.getSession().then(({data}) => data.session ? enterAdmin() : showLogin());
  </script>
</body>
</html>
